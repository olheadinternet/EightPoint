     inkscape:zoom="3.080232"
     inkscape:cx="40.743684"
     inkscape:cy="50.807861"
     inkscape:current-layer="svg11" />
  <!-- ENTRY POINTS (invisible anchors) -->
  <g
     id="POINTS"
     fill="none"
     stroke="none">
    <!-- top -->
    <circle
       cx="333"
       cy="0"
       r="1"
       id="circle1" />
    <circle
       cx="666"
       cy="0"
       r="1"
       id="circle2" />
    <!-- right -->
    <circle
       cx="1000"
       cy="333"
       r="1"
       id="circle3" />
    <circle
       cx="1000"
       cy="666"
       r="1"
       id="circle4" />
    <!-- bottom -->
    <circle
       cx="666"
       cy="1000"
       r="1"
       id="circle5" />
    <circle
       cx="333"
       cy="1000"
       r="1"
       id="circle6" />
    <!-- left -->
    <circle
       cx="0"
       cy="666"
       r="1"
       id="circle7" />
    <circle
       cx="0"
       cy="333"
       r="1"
       id="circle8" />
  </g>
  <!-- EDIT ONLY THESE PATHS -->
  <g
     id="PATHS"
     stroke="black"
     stroke-width="20"
     fill="none"
     stroke-linecap="round"
     inkscape:label="PATHS">
    <!-- path 1 -->
    <path
       d="M333,0 C333,200 200,333 0,333"
       id="path8"
       style="stroke:#000000;stroke-opacity:1;fill:none" />
    <!-- path 2 -->
    <path
       d="M666,0 C666,200 800,333 1000,333"
       id="path9"
       style="stroke:#000000;stroke-opacity:1;fill:none;stroke-width:20;stroke-dasharray:none" />
    <!-- path 3 -->
    <path
       d="M1000,666 C800,666 666,800 666,1000"
       id="path10"
       style="stroke:#000000;stroke-opacity:1;fill:none;stroke-width:20;stroke-dasharray:none" />
    <!-- path 4 -->
    <path
       d="M0,666 C200,666 333,800 333,1000"
       id="path11"
       style="stroke:#000000;stroke-opacity:1;fill:none;stroke-width:20;stroke-dasharray:none" />
  </g>
